<!DOCTYPE html>
<head>
<link rel="stylesheet" href="Week1.css">
</head>
<body>
    <h1>User Registration</h1>
    <h2>Personal Details</h2>
    <form>
        <div><label>First Name: </label> <input type="text"></div>
        <div><label>Last Name: </label> <input type="text"></div>
        <div><label>Age: </label> <input type="number"></div>
        <div>
            <label>Gender: </label>
            <select>
            <option selected>Male</option>
            <option>Female</option>
            <option>Others</option>
            </select> 
        </div>
        <div>
        <label>Profile Picture: </label>
        <button>Browse</button><input type="file">
        </div>
    </form>
    <h2>Account Details</h2>
    <form>
        <div>
            <label>Email: </label><input type="email">
        </div>
        <div>
            <label>Password: </label><input type="password">
        </div>
        <div>
            <label>Role:</label><input type="radio">Admin<input type="radio">User
        </div>
        <div>
            <input type="checkbox"> I agree.
        </div>
        <button>Register</button>
        <button>Reset</button>
    </form>
    <footer>
        <p>© Work of SpadeOtter. 2026 </p>
    </footer>
</body>
</html>
